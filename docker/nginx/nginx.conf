# ─── Nginx Reverse Proxy for EA SaaS Platform ──────────────────────────────
# Sits in front of Next.js — SSL termination, rate limiting, security headers
# ─────────────────────────────────────────────────────────────────────────────

# Upstream Next.js application
upstream nextjs_app {
    server web:3000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# SSL session settings
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (available over HTTP for load balancers)
    location /api/health {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ─── SSL Configuration ──────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ───────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Connection Limits ──────────────────────────────────────────────
    limit_conn conn_limit 50;

    # ─── Logging ────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ─── Gzip Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── Client Body Limits ─────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ─── Auth Routes (stricter rate limiting) ───────────────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── EA API Routes (per-license rate limiting) ──────────────────────
    location ~ ^/api/ea/ {
        limit_req zone=api_limit burst=10 nodelay;

        # Longer timeout for EA operations
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for EA clients
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key, X-License-Key" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key, X-License-Key" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ─── Webhook Route (no rate limit — Stripe controls this) ──────────
    location = /api/webhooks/stripe {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stripe webhook timeout
        proxy_read_timeout 30s;
    }

    # ─── Health Check (no rate limit) ──────────────────────────────────
    location = /api/health {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── All Other API Routes ──────────────────────────────────────────
    location ~ ^/api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Next.js Static Assets ──────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;

        # Static assets — aggressive caching
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── Next.js Image Optimization ────────────────────────────────────
    location /_next/image {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── All Other Requests ─────────────────────────────────────────────
    location / {
        limit_req zone=web_limit burst=30 nodelay;

        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js SSR timeout
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # HTTP/2 push for critical resources
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Block Sensitive Paths ─────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location ~ ^/(prisma|migrations|scripts)/ {
        deny all;
        return 404;
    }

    # ─── Favicon & Robots ───────────────────────────────────────────────
    location = /favicon.ico {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        access_log off;
        expires 7d;
    }

    location = /robots.txt {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        access_log off;
        expires 7d;
    }
}
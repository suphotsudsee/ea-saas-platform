name: ea-saas-platform

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ea_saas}
      MYSQL_USER: ${MYSQL_USER:-ea_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ea_password123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-ea_user}:${MYSQL_PASSWORD:-ea_password123}@mysql:3306/${MYSQL_DATABASE:-ea_saas}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-to-a-32-char-secret-key-at-least}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@ea-saas.local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      RATE_LIMIT_EA_RPM: ${RATE_LIMIT_EA_RPM:-60}
      RATE_LIMIT_WEB_RPM: ${RATE_LIMIT_WEB_RPM:-120}
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-60}
      HEARTBEAT_STALE_FACTOR: ${HEARTBEAT_STALE_FACTOR:-3}
      LICENSE_CACHE_TTL_SEC: ${LICENSE_CACHE_TTL_SEC:-300}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-ea_user}:${MYSQL_PASSWORD:-ea_password123}@mysql:3306/${MYSQL_DATABASE:-ea_saas}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  adminer:
    image: adminer:latest
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

volumes:
  mysql_data:
  redis_data:

networks:
  app:
    driver: bridge

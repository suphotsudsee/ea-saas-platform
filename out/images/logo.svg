<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="40%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Candle body -->
  <rect x="14" y="20" width="18" height="42" rx="2" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Wick -->
  <line x1="23" y1="20" x2="23" y2="12" stroke="#D4AF37" stroke-width="2"/>
  <!-- Flame -->
  <ellipse cx="23" cy="9" rx="5" ry="7" fill="url(#flameGrad)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="ry" values="7;8;7" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.95;1;0.95" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="23" cy="7" rx="2.5" ry="4" fill="#FFF5D4" opacity="0.8">
    <animate attributeName="ry" values="4;5;4" dur="1.2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Chart line (behind text) -->
  <polyline points="46,55 58,45 70,50 85,30 100,35 115,15" 
            stroke="#D4AF37" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Chart dots -->
  <circle cx="85" cy="30" r="2.5" fill="#D4AF37" opacity="0.4"/>
  <circle cx="115" cy="15" r="2.5" fill="#D4AF37" opacity="0.4"/>
  
  <!-- Brand name -->
  <text x="46" y="50" font-family="'Kanit', 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
    Trade<tspan fill="#D4AF37">Candle</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="46" y="68" font-family="'Kanit', 'Segoe UI', Arial, sans-serif" font-size="10" fill="#A0A0A8" letter-spacing="3" font-weight="400">
    AI GOLD TRADING
  </text>
  
  <!-- v11 badge -->
  <rect x="208" y="28" width="28" height="16" rx="8" fill="#D4AF37"/>
  <text x="222" y="40" font-family="'Kanit', 'Segoe UI', Arial, sans-serif" font-size="9" fill="#0A0A0A" text-anchor="middle" font-weight="700">v11</text>
</svg>
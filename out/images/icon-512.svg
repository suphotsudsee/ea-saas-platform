<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldRadial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="flameG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0A0A0A"/>
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#D4AF37" stroke-width="2" opacity="0.9"/>
  
  <!-- Candle body -->
  <rect x="210" y="200" width="92" height="180" rx="6" fill="url(#goldRadial)" opacity="0.95"/>
  <rect x="220" y="210" width="72" height="160" rx="4" fill="#0A0A0A" opacity="0.15"/>
  
  <!-- Wick -->
  <line x1="256" y1="200" x2="256" y2="160" stroke="#D4AF37" stroke-width="4"/>
  
  <!-- Flame -->
  <ellipse cx="256" cy="140" rx="28" ry="45" fill="url(#flameG)" filter="url(#iconGlow)" opacity="0.95">
    <animate attributeName="ry" values="45;50;45" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="28;26;28" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="256" cy="130" rx="14" ry="28" fill="#FFF5D4" opacity="0.85">
    <animate attributeName="ry" values="28;32;28" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="256" cy="125" rx="5" ry="10" fill="#FFFFFF" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="1.3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Chart line going up from candle -->
  <polyline points="160,380 200,340 240,350 280,280 320,290 360,200" 
            stroke="#D4AF37" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Chart arrows -->
  <circle cx="280" cy="280" r="4" fill="#10B981"/>
  <circle cx="360" cy="200" r="4" fill="#10B981"/>
  
  <!-- 3 wave labels -->
  <text x="256" y="440" font-family="'Kanit', Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="700">
    TradeCandle
  </text>
  <text x="256" y="472" font-family="'Kanit', Arial, sans-serif" font-size="16" fill="#D4AF37" text-anchor="middle" letter-spacing="4" font-weight="400">
    AI GOLD TRADING
  </text>
</svg>
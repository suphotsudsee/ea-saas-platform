<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>TikTok Cover 2 - Myth Busting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>body{margin:0;overflow:hidden;background:#0A0A0F;}</style>
</head>
<body>
<script>
const W = 1080, H = 1920;
const GOLD = '#D4AF37';
const BLACK = '#0A0A0F';
const GREEN = '#10B981';
const AMBER = '#F59E0B';
const RED = '#EF4444';

function setup() {
  createCanvas(W, H);
  pixelDensity(1);
  noLoop();
}

function draw() {
  background(BLACK);

  // Diagonal accents
  for (let i = 0; i < 10; i++) {
    stroke(color(GOLD).levels[0], color(GOLD).levels[1], color(GOLD).levels[2], 5);
    strokeWeight(1);
    line(i * 250 - 200, 0, i * 250 + 400, H);
  }

  // Gold top bar
  noStroke();
  fill(GOLD);
  rect(0, 0, W, 8);

  // === Header ===
  fill(RED);
  textAlign(CENTER, TOP);
  textStyle(BOLD);
  textSize(24);
  text('━━━━━━━━━━━━━━━━━━', W / 2, 30);

  fill(255);
  textSize(32);
  text('เรื่องเข้าใจผิด #1', W / 2, 65);

  fill(RED);
  textSize(72);
  textStyle(BOLD);
  text('"EA ขาดทุนจริงหรอ?"', W / 2, 110);

  fill(180);
  textSize(26);
  textStyle(NORMAL);
  text('มาเช็คข้อเท็จจริงกัน 👇', W / 2, 210);

  fill(255);
  textSize(24);
  text('━━━━━━━━━━━━━━━━━━', W / 2, 260);

  // === Myth vs Reality cards ===
  let cardStartY = 310;
  const myths = [
    {
      myth: '❌ "EA เทรดสุ่ม ๆ ไม่มีหลักการ"',
      reality: '✅ TradeCandle ใช้ 6 Smart Money Filters\nวิเคราะห์ทรงสตรัคเจอร์อัตโนมัติ',
      color: '#8B5CF6'
    },
    {
      myth: '❌ "ใช้ EA แล้วขาดทุนทุกที"',
      reality: '✅ 3-Wave Cashout ปิดกำไรเป็นรอบ\nไม่ปล่อยให้กำไรหนี',
      color: GREEN
    },
    {
      myth: '❌ "EA ทำงานคนเดียว คุมไม่ได้"',
      reality: '✅ Kill Switch หยุดทันที 1 คลิก\nDashboard ดูผล Real-time',
      color: RED
    },
    {
      myth: '❌ "เซ็ตแล้วลืม ขาดทุนไม่รู้ตัว"',
      reality: '✅ SaaS Dashboard แจ้งเตือน\nตรวจสอบได้ทุกที่ทุกเวลา',
      color: AMBER
    },
  ];

  for (let i = 0; i < myths.length; i++) {
    let m = myths[i];
    let cy = cardStartY + i * 280;
    let cw = W - 120;
    let ch = 250;

    // Card
    fill(16, 16, 26);
    stroke(m.color);
    strokeWeight(2);
    rect(60, cy, cw, ch, 16);

    // Number badge
    fill(m.color);
    noStroke();
    ellipse(100, cy + 35, 40, 40);
    fill(BLACK);
    textAlign(CENTER, CENTER);
    textStyle(BOLD);
    textSize(18);
    text((i + 1).toString(), 100, cy + 33);

    // Myth
    fill(RED);
    textAlign(LEFT, TOP);
    textSize(18);
    textStyle(BOLD);
    text(m.myth, 130, cy + 22);

    // Divider
    stroke(m.color);
    strokeWeight(1);
    line(80, cy + 55, cw - 20 + 60, cy + 55);

    // Reality
    fill(GREEN);
    textSize(20);
    textStyle(BOLD);
    noStroke();
    let rLines = m.reality.split('\n');
    for (let r = 0; r < rLines.length; r++) {
      fill(r === 0 ? color(m.color) : color(200));
      text(rLines[r], 85, cy + 75 + r * 30);
    }

    // Bottom detail line
    fill(80);
    textSize(13);
    textStyle(NORMAL);
    if (i === 0) text('BOS • CHoCH • Order Block • FVG • Liquidity Sweep • S/D Zone', 85, cy + ch - 25);
    if (i === 1) text('Wave 1: 25% • Wave 2: 50% • Wave 3: Trail', 85, cy + ch - 25);
    if (i === 2) text('ควบคุมเต็ม 100% หยุดได้ทุกเมื่อ', 85, cy + ch - 25);
    if (i === 3) text('ตรวจสอบได้จากมือถือ ทุกที่ทุกเวลา', 85, cy + ch - 25);
  }

  // === Result summary ===
  let summaryY = cardStartY + 4 * 280 + 30;

  // Glow box
  for (let g = 3; g >= 0; g--) {
    fill(color(GOLD).levels[0], color(GOLD).levels[1], color(GOLD).levels[2], 8);
    noStroke();
    rect(60 - g * 3, summaryY - g * 2, W - 120 + g * 6, 100 + g * 4, 20);
  }

  fill(20, 18, 10);
  stroke(GOLD);
  strokeWeight(3);
  rect(60, summaryY, W - 120, 100, 20);

  fill(GOLD);
  textAlign(CENTER, CENTER);
  textStyle(BOLD);
  textSize(28);
  noStroke();
  text('EA ไม่ได้ขาดทุนเสมอ', W / 2, summaryY + 30);
  fill(200);
  textSize(18);
  textStyle(NORMAL);
  text('ใช้ฟิลเตอร์ดี + บริหารความเสี่ยง = กำไรสม่ำเสมอ', W / 2, summaryY + 65);

  // === CTA Button ===
  let ctaY = summaryY + 140;
  fill(GOLD);
  rect(W / 2 - 280, ctaY, 560, 85, 43);
  fill(BLACK);
  textAlign(CENTER, CENTER);
  textStyle(BOLD);
  textSize(28);
  text('🚀 พิสูจน์ด้วยตัวเอง 7 วันฟรี', W / 2, ctaY + 42);

  fill(100);
  textSize(16);
  textStyle(NORMAL);
  text('ไม่ต้องใส่บัตรเครดิต • เริ่มต้น 990฿/เดือน', W / 2, ctaY + 110);

  // Brand
  fill(80);
  textSize(14);
  text('TradeCandle v11 • AI EA for XAUUSD/MT5', W / 2, H - 40);

  // Bottom gold bar
  fill(GOLD);
  rect(0, H - 8, W, 8);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('tiktok-cover-2', 'png');
}
</script>
</body>
</html>

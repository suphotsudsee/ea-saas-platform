<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>FB Post 1 - Pain Point Hook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>body{margin:0;overflow:hidden;background:#0A0A0F;}</style>
</head>
<body>
<script>
const W = 1200, H = 1200;
const GOLD = '#D4AF37';
const BLACK = '#0A0A0F';
const GREEN = '#10B981';
const AMBER = '#F59E0B';
const RED = '#EF4444';

function setup() {
  createCanvas(W, H);
  pixelDensity(1);
  noLoop();
}

function draw() {
  background(BLACK);

  // Subtle grid
  stroke(255, 255, 255, 10);
  strokeWeight(0.5);
  for (let i = 0; i < W; i += 40) line(i, 0, i, H);
  for (let j = 0; j < H; j += 40) line(0, j, W, j);

  // Gold accent line at top
  noStroke();
  fill(GOLD);
  rect(0, 0, W, 6);

  // === LEFT: Pain Point Chart ===
  push();
  translate(80, 280);

  // Label
  fill(RED);
  textAlign(CENTER, TOP);
  textSize(22);
  textStyle(BOLD);
  text('❌ แบบเก่า : รอ TP แล้วราคากลับ', 240, -50);

  // Chart background
  fill(20, 20, 30);
  stroke(40, 40, 55);
  strokeWeight(1);
  rect(0, 0, 480, 400, 12);

  // Grid lines inside chart
  stroke(40, 40, 55);
  strokeWeight(0.5);
  for (let j = 50; j < 400; j += 50) line(10, j, 470, j);

  // Price labels
  fill(120);
  noStroke();
  textSize(14);
  textAlign(RIGHT, CENTER);
  text('2065', 50, 50);
  text('2055', 50, 170);
  text('2045', 50, 290);
  text('2035', 50, 400);

  // Chart line going up then crashing — pain scenario
  stroke(GREEN);
  strokeWeight(3);
  noFill();
  beginShape();
  let pts = [
    [70, 360], [130, 320], [180, 280], [220, 230],
    [270, 180], [310, 140], [350, 95], [380, 60], [400, 40]
  ];
  for (let p of pts) vertex(p[0], p[1]);
  endShape();

  // TP line
  stroke(GREEN, 150);
  strokeWeight(1);
  strokeDashOffset = 0;
  drawingContext.setLineDash([8, 6]);
  line(400, 40, 460, 40);
  drawingContext.setLineDash([]);

  fill(GREEN);
  noStroke();
  textSize(16);
  textAlign(LEFT, BOTTOM);
  text('TP →', 405, 36);

  // Crash down from near TP
  stroke(RED);
  strokeWeight(3);
  noFill();
  beginShape();
  vertex(400, 40);
  vertex(410, 80);
  vertex(420, 140);
  vertex(440, 220);
  vertex(460, 320);
  vertex(470, 380);
  endShape();

  // Loss annotation
  fill(RED);
  noStroke();
  textSize(18);
  textAlign(LEFT, TOP);
  textStyle(BOLD);
  text('-$60 → กลับเป็น -$40 💔', 80, 415);
  pop();

  // === VS divider ===
  push();
  fill(GOLD);
  textAlign(CENTER, CENTER);
  textSize(48);
  textStyle(BOLD);
  text('VS', W / 2, 480);
  stroke(GOLD);
  strokeWeight(2);
  line(W / 2, 510, W / 2, 440);
  pop();

  // === RIGHT: 3-Wave Cashout ===
  push();
  translate(640, 280);

  fill(GREEN);
  textAlign(CENTER, TOP);
  textSize(22);
  textStyle(BOLD);
  noStroke();
  text('✅ 3-Wave Cashout : ปิดกำไร 3 รอบ', 240, -50);

  // Chart background
  fill(10, 30, 20);
  stroke(20, 60, 40);
  strokeWeight(1);
  rect(0, 0, 480, 400, 12);

  // Grid lines
  stroke(20, 60, 40);
  strokeWeight(0.5);
  for (let j = 50; j < 400; j += 50) line(10, j, 470, j);

  // Price line going up steadily
  stroke(GOLD);
  strokeWeight(3);
  noFill();
  beginShape();
  let pts2 = [
    [70, 360], [130, 310], [180, 260], [240, 210],
    [300, 160], [350, 110], [400, 70], [440, 50]
  ];
  for (let p of pts2) vertex(p[0], p[1]);
  endShape();

  // Wave 1 arrow at 25%
  stroke(GREEN);
  strokeWeight(2);
  fill(GREEN);
  let w1x = 200, w1y = 245;
  drawingContext.setLineDash([6, 4]);
  line(w1x, w1y, w1x, 30);
  drawingContext.setLineDash([]);
  
  drawWaveBadge(w1x, 28, 'Wave 1', '25%', GREEN);

  // Wave 2 arrow at 50%
  stroke(AMBER);
  strokeWeight(2);
  fill(AMBER);
  let w2x = 320, w2y = 150;
  drawingContext.setLineDash([6, 4]);
  line(w2x, w2y, w2x, 30);
  drawingContext.setLineDash([]);

  drawWaveBadge(w2x, 28, 'Wave 2', '50%', AMBER);

  // Wave 3 trail
  stroke(GOLD);
  strokeWeight(2);
  fill(GOLD);
  let w3x = 430, w3y = 55;

  drawWaveBadge(w3x, 28, 'Wave 3', 'Trail 🏃', GOLD);

  // Profit result
  fill(GREEN);
  noStroke();
  textSize(18);
  textStyle(BOLD);
  textAlign(LEFT, TOP);
  text('+$60 ปิดกำไรแล้ว ✅', 80, 415);
  pop();

  // === Main headline ===
  fill(255);
  textAlign(CENTER, TOP);
  textStyle(BOLD);
  textSize(42);
  text('เคยเป็นไหม?', W / 2, 30);

  fill(GOLD);
  textSize(26);
  text('เทรดทองขึ้น +$60 แต่รอ TP แล้วราคากลับ', W / 2, 80);

  // === Bottom CTA ===
  fill(GOLD);
  rect(W / 2 - 280, 1100, 560, 65, 33);
  fill(BLACK);
  textAlign(CENTER, CENTER);
  textSize(28);
  textStyle(BOLD);
  text('ทดลอง 7 วันฟรี → เริ่มต้น 990฿/เดือน', W / 2, 1130);

  // Brand
  fill(180);
  textSize(16);
  textStyle(NORMAL);
  text('TradeCandle v11 • AI EA for XAUUSD/MT5', W / 2, 1180);
}

function drawWaveBadge(x, y, label, pct, col) {
  fill(color(col).levels[0], color(col).levels[1], color(col).levels[2], 40);
  stroke(col);
  strokeWeight(2);
  rectMode(CENTER);
  rect(x, y + 14, 110, 30, 15);
  fill(col);
  noStroke();
  textSize(14);
  textStyle(BOLD);
  textAlign(CENTER, CENTER);
  text(label + ' ' + pct, x, y + 14);
  rectMode(CORNER);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('fb-post-1', 'png');
}
</script>
</body>
</html>

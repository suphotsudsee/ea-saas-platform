# ─── EA SaaS Platform — Prometheus Configuration ──────────────────────────
# Scrapes metrics from Next.js app, MySQL, Redis, and node exporter
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # External labels for multi-instance setups
  external_labels:
    monitor: "ea-saas-platform"
    environment: "production"

# ─── Alerting Rules ──────────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ─── Alertmanager ────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# ─── Scrape Configs ──────────────────────────────────────────────────────────
scrape_configs:
  # ─── Next.js Application Metrics ────────────────────────────────────────
  - job_name: "ea-saas-app"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["web:3000"]
        labels:
          service: "nextjs"
          component: "web"

  # ─── Next.js Custom Metrics ──────────────────────────────────────────────
  - job_name: "ea-saas-custom"
    metrics_path: "/api/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["web:3000"]
        labels:
          service: "nextjs"
          component: "api"

  # ─── Node Exporter (System Metrics) ──────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "system"

  # ─── MySQL Exporter ──────────────────────────────────────────────────────
  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["mysql-exporter:9104"]
        labels:
          service: "database"
          component: "mysql"

  # ─── Redis Exporter ──────────────────────────────────────────────────────
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "cache"
          component: "redis"

  # ─── Nginx Exporter ──────────────────────────────────────────────────────
  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: "proxy"
          component: "nginx"

  # ─── Prometheus Self-Monitoring ──────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
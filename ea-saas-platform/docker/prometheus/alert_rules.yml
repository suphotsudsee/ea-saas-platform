# ─── EA SaaS Platform — Prometheus Alert Rules ──────────────────────────────
# Define alerting thresholds for platform monitoring
# ─────────────────────────────────────────────────────────────────────────────

groups:
  # ─── Application Alerts ──────────────────────────────────────────────────
  - name: app_alerts
    rules:
      - alert: AppDown
        expr: up{job="ea-saas-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EA SaaS application is down"
          description: "The Next.js application has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{job="ea-saas-app",code=~"5.."}[5m])) / sum(rate(http_requests_total{job="ea-saas-app"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="ea-saas-app"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency detected"
          description: "P95 latency is {{ $value }}s over the last 5 minutes."

  # ─── Database Alerts ──────────────────────────────────────────────────────
  - name: database_alerts
    rules:
      - alert: MySQLDown
        expr: up{job="mysql-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL is down"
          description: "MySQL database has been unreachable for more than 1 minute."

      - alert: MySQLTooManyConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL connection usage high"
          description: "MySQL is using {{ $value | humanizePercentage }} of available connections."

  # ─── Redis Alerts ────────────────────────────────────────────────────────
  - name: redis_alerts
    rules:
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 1 minute."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value | humanizePercentage }} of allocated memory."

  # ─── System Alerts ──────────────────────────────────────────────────────
  - name: system_alerts
    rules:
      - alert: HighDiskUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on /."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage high"
          description: "Memory usage is at {{ $value | humanizePercentage }}."
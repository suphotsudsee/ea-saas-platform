# EA SaaS Platform - Coolify Docker Compose
# All secrets/credentials are managed by Coolify Environment Variables UI.
# This file contains only structural Docker config.

services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - SERVICE_URL_WEB_3004
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3004
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
    expose:
      - "3004"
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - coolify

volumes:
  redis_data:

networks:
  coolify:
    external: true

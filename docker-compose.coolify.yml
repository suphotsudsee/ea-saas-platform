# EA SaaS Platform - Coolify Docker Compose
# App-only compose. MySQL and Redis are managed as separate Coolify resources.
#
# In Coolify, set DATABASE_URL and REDIS_URL from the linked database resources.
# The resource hostnames usually match the resource names, for example:
#   mysql-ea-saas
#   redis-ea-saas

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_URL_WEB_3004
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3004
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:?}
      - REDIS_URL=${REDIS_URL:-redis://default:ZRVlKpKLegBiXdGbX2smhzNzXNBPiHLj830ftWOKjOdhfpQ3dAh5uAPBA2ETi8m7@umffn7cgvg6qnfi96jmblhmd:6379/0}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ea-saas.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@2026!Secure}
      - APP_URL=${APP_URL:-}
      - API_URL=${API_URL:-}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ea-saas.local}
      - RATE_LIMIT_EA_RPM=${RATE_LIMIT_EA_RPM:-60}
      - RATE_LIMIT_WEB_RPM=${RATE_LIMIT_WEB_RPM:-120}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC:-60}
      - HEARTBEAT_STALE_FACTOR=${HEARTBEAT_STALE_FACTOR:-3}
      - LICENSE_CACHE_TTL_SEC=${LICENSE_CACHE_TTL_SEC:-300}
    expose:
      - "3004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - coolify

networks:
  coolify:
    external: true

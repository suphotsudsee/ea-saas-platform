# ─── EA SaaS Platform — Coolify Docker Compose ──────────────────────────────
# Simple compose: Coolify injects environment variables at RUNTIME automatically.
# Redis is included here as a sidecar container.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    networks:
      - coolify
    depends_on:
      redis:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - coolify
    volumes:
      - redis_data:/data

networks:
  coolify:
    external: true

volumes:
  redis_data:

# EA SaaS Platform - Coolify Docker Compose
# MySQL managed as separate Coolify resource. Redis included here for simplicity.

services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - SERVICE_URL_WEB_3004
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3004
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:?}
      - REDIS_URL=redis://redis:6379/0
      - NEXTAUTH_SECRET=${NEXT...T:?}
      - NEXTAUTH_URL=***
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ea-saas.com}
      - ADMIN_PASSWORD=${ADMI...ure}
      - APP_URL=${APP_URL:-}
      - API_URL=${API_URL:-}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
      - STRIPE_SECRET_KEY=${STRI...der}
      - STRIPE_WEBHOOK_SECRET=${STRI...der}
      - RESEND_API_KEY=${RESE...der}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ea-saas.local}
      - RATE_LIMIT_EA_RPM=${RATE_LIMIT_EA_RPM:-60}
      - RATE_LIMIT_WEB_RPM=${RATE_LIMIT_WEB_RPM:-120}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC:-60}
      - HEARTBEAT_STALE_FACTOR=${HEARTBEAT_STALE_FACTOR:-3}
      - LICENSE_CACHE_TTL_SEC=${LICENSE_CACHE_TTL_SEC:-300}
    expose:
      - "3004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - coolify

volumes:
  redis_data:

networks:
  coolify:
    external: true

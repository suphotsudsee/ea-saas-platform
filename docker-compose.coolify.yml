# ─── EA SaaS Platform — Coolify Docker Compose ──────────────────────────────
# Next.js app connecting to Coolify-managed MySQL & Redis
# Coolify will inject Traefik labels and environment variables automatically
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    networks:
      - coolify

networks:
  coolify:
    external: true
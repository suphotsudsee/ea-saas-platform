# ─── Redis Configuration for EA SaaS Platform ────────────────────────────────

# Memory limit
maxmemory 256mb

# Eviction policy — evict least recently used keys when memory is full
maxmemory-policy allkeys-lru

# Save to disk (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# RDB file name
dbfilename dump.rdb

# AOF persistence for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Logging
loglevel notice

# TCP settings
tcp-keepalive 300
tcp-backlog 511

# Timeout for idle connections (0 = no timeout)
timeout 0

# Disable dangerous commands for security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# Client output buffer limits
# normal: no limit, replica: 256MB/64MB/60s, pubsub: 32MB/8MB/60s
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pub-sub 32mb 8mb 60